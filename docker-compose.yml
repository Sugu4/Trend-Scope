version: "3.9"

# ─── TrendScope — Docker Compose ──────────────────────────────
# Startet alle Dienste lokal mit einem Befehl: docker compose up -d

services:

  # ── Datenbanken ───────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: trendscope-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: trendscope

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: trendscope-es
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data

  postgres:
    image: postgres:16-alpine
    container_name: trendscope-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trendscope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pg_data:/var/lib/postgresql/data

  # ── Backend ───────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendscope-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongodb:27017
      ELASTICSEARCH_URL: http://elasticsearch:9200
      POSTGRES_URI: postgresql+asyncpg://postgres:password@postgres:5432/trendscope
    depends_on:
      - mongodb
      - elasticsearch
      - postgres

volumes:
  mongo_data:
  es_data:
  pg_data:
